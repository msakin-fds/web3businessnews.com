name: Deploy to SiteGround

on:
  push:
    branches: [main]
    paths:
      - 'wp-content/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test SSH connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "SSH OK — server: $(hostname)"
            echo "WP path check: $(ls ${{ secrets.WP_PATH }}/wp-config.php 2>&1)"
            echo "wp-content writable: $(test -w ${{ secrets.WP_PATH }}/wp-content && echo YES || echo NO)"

      - name: Remove placeholder files before deploy
        run: find wp-content -name '.gitkeep' -delete

      - name: Deploy wp-content via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "wp-content"
          target: ${{ secrets.WP_PATH }}

      - name: Verify deployment + clear cache
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Plugin check: $(ls ${{ secrets.WP_PATH }}/wp-content/plugins/web3bn-eeat/web3bn-eeat.php 2>&1)"
            if command -v wp &> /dev/null; then
              wp cache flush --allow-root --path=${{ secrets.WP_PATH }}
            fi
            echo "Deploy complete at $(date)"
